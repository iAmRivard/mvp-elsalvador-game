server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    autoindex off;

    charset utf-8;
    server_tokens off;

    include /etc/nginx/security-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/manifest+json image/svg+xml text/css text/plain;

    location = /healthz {
        include /etc/nginx/security-headers.conf;
        access_log off;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    location ~* \.pmtiles$ {
        include /etc/nginx/security-headers.conf;
        default_type application/octet-stream;
        add_header Accept-Ranges "bytes" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.glb$ {
        include /etc/nginx/security-headers.conf;
        default_type model/gltf-binary;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location /assets/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ^~ /map-assets/styles/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location ^~ /map-assets/sprites/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.(?:pbf|png|svg|wav|woff2|json)$ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location = /index.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}

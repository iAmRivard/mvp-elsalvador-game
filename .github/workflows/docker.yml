name: Docker

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout con Git LFS
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Obtener archivos LFS
        run: git lfs pull && test -s public/maps/el-salvador.pmtiles

      - name: Configurar Node.js para prueba de navegador
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Instalar Playwright
        run: npm ci && npx playwright install --with-deps chromium

      - name: Construir imagen de prueba
        run: docker build --tag rutas-perdidas:test .

      - name: Iniciar contenedor
        run: docker run --detach --rm --name rutas-perdidas --publish 8080:80 rutas-perdidas:test

      - name: Verificar salud, CSP, archivos locales y Range Requests
        run: |
          for attempt in $(seq 1 20); do
            curl --fail --silent http://127.0.0.1:8080/healthz && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8080/ | grep -q "root"
          curl --fail --silent --head http://127.0.0.1:8080/ | grep -qi "content-security-policy:"
          status=$(curl --silent --output /tmp/map-range.bin --write-out "%{http_code}" --header "Range: bytes=0-1023" http://127.0.0.1:8080/maps/el-salvador.pmtiles)
          test "$status" = "206"
          test "$(wc -c < /tmp/map-range.bin)" = "1024"
          curl --fail --silent http://127.0.0.1:8080/data/roads/western-corridor.json --output /tmp/roads.json
          test "$(wc -c < /tmp/roads.json)" -gt "5000000"
          curl --fail --silent http://127.0.0.1:8080/audio/engine-idle.wav --output /tmp/engine.wav
          test "$(wc -c < /tmp/engine.wav)" -gt "40000"
          curl --fail --silent http://127.0.0.1:8080/audio/music-timed.wav --output /tmp/music.wav
          test "$(wc -c < /tmp/music.wav)" -gt "500000"
          curl --fail --silent --head http://127.0.0.1:8080/map-assets/styles/el-salvador.json | grep -qi "content-type: application/json"
          curl --fail --silent --head http://127.0.0.1:8080/map-assets/styles/el-salvador.json | grep -qi "cache-control: no-cache, must-revalidate"
          ! curl --fail --silent http://127.0.0.1:8080/map-assets/sprites/does-not-exist.json --output /tmp/missing-sprite.json
          missing_headers=$(curl --silent --head http://127.0.0.1:8080/map-assets/sprites/does-not-exist.json)
          printf "%s" "$missing_headers" | grep -q "404 Not Found"
          printf "%s" "$missing_headers" | grep -qi "cache-control: no-cache, must-revalidate"
          ! printf "%s" "$missing_headers" | grep -qi "immutable"
          missing_model_headers=$(curl --silent --head http://127.0.0.1:8080/models/does-not-exist.glb)
          printf "%s" "$missing_model_headers" | grep -q "404 Not Found"
          ! printf "%s" "$missing_model_headers" | grep -qi "max-age"

      - name: Probar mapa y autonomía en navegador
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
        run: npm run test:e2e

      - name: Detener contenedor de prueba
        if: always()
        run: docker stop rutas-perdidas || true

      - name: Iniciar sesión en GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar imagen por SHA
        if: github.event_name != 'pull_request'
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker tag rutas-perdidas:test "$image:${GITHUB_SHA}"
          docker tag rutas-perdidas:test "$image:latest"
          docker push "$image:${GITHUB_SHA}"
          docker push "$image:latest"

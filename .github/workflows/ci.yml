name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout con Git LFS
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Verificar artefacto LFS
        run: git lfs pull && test -s public/maps/el-salvador.pmtiles

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar verificaciones
        run: npm run check
